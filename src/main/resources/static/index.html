<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>습관 정원 · Habit Garden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
    <link rel="stylesheet" href="/style.css"/>
    <link rel="manifest" href="/manifest.json"/>
    <meta name="theme-color" content="#2F6F4E"/>
    <!-- iOS ignores the manifest icons and looks for this instead. -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
</head>
<body>
    <div class="leaf-bg" aria-hidden="true"></div>
    <div id="offline-banner" class="offline-banner" role="status" hidden></div>

    <header class="topbar">
        <div class="brand">
            <span class="brand-mark">❖</span>
            <span class="brand-name">습관 정원</span>
        </div>
        <div id="account" class="account"><!-- filled by app.js --></div>
    </header>

    <main id="app" class="app">
        <!-- Views are rendered here by app.js -->
        <div class="loading">불러오는 중…</div>
    </main>

    <footer class="foot">
        매일 한 칸씩. 오늘 심은 잔디가 내일의 숲이 됩니다.
    </footer>

    <script src="/app.js"></script>
    <script>
        // Registration failures are non-fatal: the app works fine without the
        // worker, it just loses offline start-up.
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("/sw.js").catch(function () {});
            });
        }
    </script>
</body>
</html>
